<div class="masthead" role="banner">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav" aria-label="Main navigation">
        <button aria-label="Toggle menu" aria-expanded="false" aria-controls="site-nav"><div class="navicon" aria-hidden="true"></div></button>
        <ul class="visible-links" role="list">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me">Homepage</a></li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden" role="list" aria-label="More navigation links"></ul>
      </nav>
    </div>
  </div>
</div>
