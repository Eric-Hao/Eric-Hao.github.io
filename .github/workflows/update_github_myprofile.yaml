name: Update github myprofile

on:
  page_build:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source repo
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Updater
      run: |
        cd ./github_myprofile_updater
        python3 update.py

    - name: Clone target repo and push
      env:
        PAT: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
      run: |
        # 1. clone 目标仓库到独立目录
        git clone "https://Eric-Hao:${PAT}@github.com/Eric-Hao/Eric-Hao.git" target_repo

        # 2. 将生成的文件复制到目标仓库
        cp ./github_myprofile_updater/README.md target_repo/README.md
        cp -r ./github_myprofile_updater/images target_repo/  # 如果有 images 目录

        # 3. 在目标仓库中 commit 和 push
        cd target_repo
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git add images  # 如果有 images 目录

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "update my description automatically"
          git push origin main
        fi
