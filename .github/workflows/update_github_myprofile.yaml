name: Update github myprofile

on:
  page_build:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Run Updater
      run: |
        cd ./github_myprofile_updater
        python3 update.py
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git add images
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "update my description automatically"
          git push "https://${{ github.actor }}:${{ secrets.GHRS_GITHUB_API_TOKEN }}@github.com/Eric-Hao/Eric-Hao.git" HEAD:main --force
        fi

